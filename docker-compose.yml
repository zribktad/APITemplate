services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apitemplate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
      POSTGRES_DB: authentik
    volumes:
      - authentik-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: "change-me-to-a-long-random-string-in-production"
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: "admin@localhost"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "admin"
      AUTHENTIK_BOOTSTRAP_TOKEN: "dev-admin-api-token"
    ports:
      - "9000:9000"
      - "9443:9443"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - ./infrastructure/authentik/blueprints:/blueprints/custom

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: "change-me-to-a-long-random-string-in-production"
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: "admin@localhost"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "admin"
      AUTHENTIK_BOOTSTRAP_TOKEN: "dev-admin-api-token"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - ./infrastructure/authentik/blueprints:/blueprints/custom

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/APITemplate/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=apitemplate;Username=postgres;Password=postgres"
      MongoDB__ConnectionString: "mongodb://mongodb:27017"
      MongoDB__DatabaseName: "apitemplate"
      Authentik__Authority: "http://authentik-server:9000/application/o/api-template/"
      Authentik__ClientId: "api-template"
      Authentik__ClientSecret: "dev-client-secret"
      Authentik__TokenEndpoint: "http://authentik-server:9000/application/o/token/"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      authentik-server:
        condition: service_healthy

volumes:
  pgdata:
  mongodata:
  authentik-pgdata:
  authentik-redis:
  authentik-media:
  authentik-templates:
