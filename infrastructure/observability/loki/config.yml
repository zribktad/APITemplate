auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  discover_log_levels: true
  discover_service_name:
    - service_name
    - service
    - app
    - application
    - name
    - app_kubernetes_io_name
    - container
    - container_name
    - component
    - workload
    - job

analytics:
  reporting_enabled: false
